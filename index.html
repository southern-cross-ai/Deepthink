<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepthink: The Guild AI Team</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap">
    <style>
        body {
            margin: 0;
            color: white;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
        }

        #instructions {
            display: none;
        }

        #results,
        body:hover #instructions {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.75);
        }

        a:visited {
            color: inherit;
        }

        #results {
            display: none;
            cursor: default;
        }

        #results .content,
        #instructions .content {
            max-width: 300px;
            padding: 50px;
            border-radius: 20px;
        }

        #score {
            position: absolute;
            color: white;
            font-size: 3em;
            font-weight: bold;
            top: 30px;
            right: 30px;
        }

        #youtube,
        #youtube-card {
            display: none;
            color: black;
        }

        @media (min-height: 425px) {
            #youtube {
                z-index: 50;
                width: 100px;
                height: 70px;
                position: fixed;
                bottom: 20px;
                transform: scale(0.8);
                transition: transform 0.5s;
                background: red;
                right: 20px;
                border-radius: 50% / 11%;
                display: block;
            }

            #youtube:hover,
            #youtube:focus {
                transform: scale(0.9);
                color: black;
            }

            #youtube::before {
                content: "";
                display: block;
                position: absolute;
                top: 7.5%;
                left: -6%;
                width: 112%;
                height: 85%;
                background: red;
                border-radius: 9% / 50%;
            }

            #youtube::after {
                content: "";
                display: block;
                position: absolute;
                top: 20px;
                left: 40px;
                width: 45px;
                height: 30px;
                border: 15px solid transparent;
                box-sizing: border-box;
                border-left: 30px solid white;
            }

            #youtube span {
                font-size: 0;
                position: absolute;
                width: 0;
                height: 0;
                overflow: hidden;
            }

            #youtube:hover + #youtube-card {
                z-index: 49;
                display: block;
                position: fixed;
                bottom: 12px;
                width: 300px;
                background-color: white;
                right: 10px;
                padding: 25px 130px 25px 25px;
            }
        }
    </style>
</head>
<body>
    <h1>Deepthink: The Guild AI Team</h1>
</body>
</html>
